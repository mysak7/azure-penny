name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for OIDC

env:
  IMAGE_NAME: azure-penny

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image-tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        run: |
          ACCESS_TOKEN=$(az account get-access-token \
            --resource https://management.azure.com \
            --query accessToken -o tsv)
          REFRESH_TOKEN=$(curl -sSf -X POST \
            "https://${{ vars.ACR_LOGIN_SERVER }}/oauth2/exchange" \
            -d "grant_type=access_token&service=${{ vars.ACR_LOGIN_SERVER }}&tenant=${{ vars.AZURE_TENANT_ID }}&access_token=${ACCESS_TOKEN}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['refresh_token'])")
          echo "$REFRESH_TOKEN" | docker login "${{ vars.ACR_LOGIN_SERVER }}" \
            --username "00000000-0000-0000-0000-000000000000" \
            --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.image-tag }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Container App
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --image "${{ needs.build-push.outputs.image-tag }}"

      - name: Print app URL
        run: |
          FQDN=$(az containerapp show \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Deployed to: https://$FQDN"
