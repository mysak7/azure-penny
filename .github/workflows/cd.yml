name: CD

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # Required for OIDC

env:
  IMAGE_NAME: azure-penny

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
      env-name: ${{ steps.detect.outputs.env_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect environment
        id: detect
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "env_name=dev" >> "$GITHUB_OUTPUT"
            echo "alias_tag=dev" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=prd" >> "$GITHUB_OUTPUT"
            echo "alias_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image-tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        run: |
          ACCESS_TOKEN=$(az account get-access-token \
            --resource https://management.azure.com \
            --query accessToken -o tsv)
          REFRESH_TOKEN=$(curl -sSf -X POST \
            "https://${{ vars.ACR_LOGIN_SERVER }}/oauth2/exchange" \
            -d "grant_type=access_token&service=${{ vars.ACR_LOGIN_SERVER }}&tenant=${{ vars.AZURE_TENANT_ID }}&access_token=${ACCESS_TOKEN}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['refresh_token'])")
          echo "$REFRESH_TOKEN" | docker login "${{ vars.ACR_LOGIN_SERVER }}" \
            --username "00000000-0000-0000-0000-000000000000" \
            --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.image-tag }}
            ${{ vars.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.detect.outputs.alias_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Container App (${{ needs.build-push.outputs.env-name }})
    runs-on: ubuntu-latest
    needs: build-push
    environment: ${{ needs.build-push.outputs.env-name == 'prd' && 'production' || '' }}

    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image (prd)
        if: needs.build-push.outputs.env-name == 'prd'
        run: |
          az containerapp update \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --image "${{ needs.build-push.outputs.image-tag }}"

      - name: Update Container App image (dev)
        if: needs.build-push.outputs.env-name == 'dev'
        run: |
          az containerapp update \
            --name "${{ vars.DEV_CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.DEV_RESOURCE_GROUP_NAME }}" \
            --image "${{ needs.build-push.outputs.image-tag }}"

      - name: Print app URL
        run: |
          APP_NAME=${{ needs.build-push.outputs.env-name == 'prd' && vars.CONTAINER_APP_NAME || vars.DEV_CONTAINER_APP_NAME }}
          RG=${{ needs.build-push.outputs.env-name == 'prd' && vars.RESOURCE_GROUP_NAME || vars.DEV_RESOURCE_GROUP_NAME }}
          FQDN=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Deployed to: https://$FQDN"
