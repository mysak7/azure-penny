name: Terraform

on:
  push:
    branches: [main, dev]
    paths: ["terraform/**"]
  pull_request:
    branches: [main, dev]
    paths: ["terraform/**"]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: plan
        type: choice
        options: [plan, apply]
      environment:
        description: "Target environment"
        required: true
        default: prd
        type: choice
        options: [prd, dev]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # Required for OIDC
  pull-requests: write

env:
  TF_VERSION: "1.12.0"
  # OIDC — no ARM_CLIENT_SECRET needed
  ARM_USE_OIDC: "true"
  ARM_USE_AZUREAD: "true"   # data-plane blob calls use Azure AD, not storage keys
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform:
    name: >-
      Terraform
      ${{ github.event.inputs.action
          || (github.event_name == 'pull_request' && 'plan')
          || 'apply' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    # Gate apply behind the production environment only for prd (requires manual approval if configured)
    environment: >-
      ${{ (github.ref == 'refs/heads/main' && github.event_name != 'pull_request')
          && 'production'
          || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect environment
        id: detect
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]] || \
             [[ "${{ github.base_ref }}" == "dev" ]] || \
             [[ "${{ github.event.inputs.environment }}" == "dev" ]]; then
            echo "env_name=dev"        >> "$GITHUB_OUTPUT"
            echo "tfvars=variables/dev.tfvars" >> "$GITHUB_OUTPUT"
            echo "state_key=azure-penny-dev.tfstate" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=prd"        >> "$GITHUB_OUTPUT"
            echo "tfvars=variables/prd.tfvars" >> "$GITHUB_OUTPUT"
            echo "state_key=azure-penny.tfstate" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=azure-penny-tfstate-rg" \
            -backend-config="storage_account_name=azurepennytff04cd1" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ steps.detect.outputs.state_key }}" \
            -backend-config="use_azuread_auth=true"

      - name: Write prd.tfvars
        if: steps.detect.outputs.env_name == 'prd'
        run: |
          cat > variables/prd.tfvars <<EOF
          environment           = "prd"
          location              = "eastus"
          location_short        = "eus"
          enable_cost_export    = true
          billing_profile_id    = "${{ vars.BILLING_PROFILE_ID }}"
          tags = {
            project     = "penny"
            managed_by  = "terraform"
            environment = "prd"
          }
          EOF

      - name: Write dev.tfvars
        if: steps.detect.outputs.env_name == 'dev'
        run: |
          cat > variables/dev.tfvars <<EOF
          environment        = "dev"
          location           = "swedencentral"
          location_short     = "sc"
          enable_cost_export = false
          tags = {
            project     = "penny"
            managed_by  = "terraform"
            environment = "dev"
          }
          EOF

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan \
            -var-file="${{ steps.detect.outputs.tfvars }}" \
            -var="container_image=${{ vars.ACR_LOGIN_SERVER }}/azure-penny:${{ steps.detect.outputs.env_name == 'prd' && 'latest' || 'dev' }}"
        continue-on-error: true  # Surface plan output in PR comment even on error

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const body = `#### Terraform Plan ${status}
            <details><summary>Show plan</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: >-
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan
